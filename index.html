<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illusion App</title>
    <style>
        /* 🎨 Umumiy Stil */
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 18px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 🖼 Markaziy Illyuziya Maydoni */
        .illusion-frame {
            width: 320px;
            height: 320px;
            background: #fff;
            border: 5px solid #222;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.1);
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
        }

        /* 1. GIPNOZ (Aylanish) */
        #layer1 {
            display: block;
            background: repeating-conic-gradient(#000 0% 1%, #fff 1% 2%);
            animation: rotate 12s linear infinite;
        }

        /* 2. TEBRANISH (Chiziqlar) */
        #layer2 {
            background: repeating-linear-gradient(90deg, #000 0px, #000 5px, #fff 5px, #fff 10px);
            animation: skew 0.8s ease-in-out infinite alternate;
        }

        /* 3. GRID (Yashirin nuqtalar) */
        #layer3 {
            background-color: #000;
            background-image: 
                linear-gradient(#fff 2px, transparent 2px),
                linear-gradient(90deg, #fff 2px, transparent 2px);
            background-size: 35px 35px;
        }
        #layer3::after {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(circle, #888 1.5px, transparent 1.5px);
            background-size: 35px 35px;
        }

        /* 4. TUNNEL (Kengayish) */
        #layer4 {
            background: repeating-radial-gradient(circle, #000, #fff 20px);
            animation: zoom 1.5s linear infinite;
        }

        /* ⚙️ Animatsiyalar */
        @keyframes rotate { from { transform: scale(2) rotate(0deg); } to { transform: scale(2) rotate(360deg); } }
        @keyframes skew { from { transform: skewX(-20deg) scale(1.5); } to { transform: skewX(20deg) scale(1.5); } }
        @keyframes zoom { from { transform: scale(1); opacity: 1; } to { transform: scale(2); opacity: 0.5; } }

        /* 🕹 Tugmalar Paneli */
        .controls {
            margin-top: 40px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-next {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            flex: 1;
            background: #111;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-next:active, .btn-small:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <h1>ILLUSION APP</h1>

    <div class="illusion-frame">
        <div id="layer1" class="layer"></div>
        <div id="layer2" class="layer"></div>
        <div id="layer3" class="layer"></div>
        <div id="layer4" class="layer"></div>
    </div>

    <div class="controls">
        <button class="btn-next" onclick="change(1)">Keyingi Illyuziya ➔</button>
        <div class="btn-row">
            <button class="btn-small" onclick="change(-1)">⏪ Orqaga</button>
            <button class="btn-small" onclick="location.reload()">↺ Reset</button>
        </div>
    </div>

    <script>
        let current = 1;
        const total = 4;

        function change(direction) {
            // Hozirgisini yashirish
            document.getElementById('layer' + current).style.display = 'none';
            
            // Yangi indeksni hisoblash
            current += direction;
            if (current > total) current = 1;
            if (current < 1) current = total;

            // Yangisini ko'rsatish
            document.getElementById('layer' + current).style.display = 'block';
            
            // Vibratsiya (telefonda seziladi)
            if (window.navigator.vibrate) window.navigator.vibrate(30);
        }
    </script>
</body>
</html>
