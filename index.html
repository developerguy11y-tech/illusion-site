<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilyushyon Mini App - V2</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #050505;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #canvas-bg { position: absolute; top: 0; left: 0; z-index: 1; }

        .glass-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .image-grid img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row { display: flex; gap: 10px; justify-content: center; }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 15px;
            cursor: pointer;
            flex: 1;
            transition: 0.3s;
        }

        .next-btn {
            background: linear-gradient(45deg, #00f2ff, #7000ff);
            font-weight: bold;
            border: none;
        }

        .control-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="glass-container">
        <h1 id="app-title">ILYUSHYON</h1>
        
        <div class="image-grid" id="grid">
            <img src="https://picsum.photos/300/300?random=1" id="img1">
            <img src="https://picsum.photos/300/300?random=2" id="img2">
            <img src="https://picsum.photos/300/300?random=3" id="img3">
            <img src="https://picsum.photos/300/300?random=4" id="img4">
        </div>

        <div class="nav-buttons">
            <button class="control-btn next-btn" onclick="nextLevel()">✨ Keyingi Illyuziya</button>
            <div class="row">
                <button class="control-btn" onclick="restart()">↺ Qaytarish</button>
                <button class="control-btn" onclick="togglePlay()" id="pBtn">▶ Boshlash</button>
            </div>
        </div>
    </div>

    <script>
        // 🌌 Fon sozlamalari
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let dots = [];
        let dotColor = '#00f2ff';

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<50; i++) {
                dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, size: Math.random()*3 });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
                ctx.fillStyle = dotColor; ctx.fill();
                d.x += d.vx; d.y += d.vy;
                if(d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if(d.y < 0 || d.y > canvas.height) d.vy *= -1;
            });
            requestAnimationFrame(draw);
        }

        // 🔀 KEYINGI FUNKSIYASI
        function nextLevel() {
            // Rasmlarni yangilash
            for(let i=1; i<=4; i++) {
                document.getElementById('img' + i).src = `https://picsum.photos/300/300?random=${Math.floor(Math.random()*1000)}`;
            }
            // Rangni o'zgartirish
            const colors = ['#00f2ff', '#ff0070', '#70ff00', '#ffcc00', '#ffffff'];
            dotColor = colors[Math.floor(Math.random() * colors.length)];
            
            // Animatsiya effekti
            document.getElementById('grid').style.opacity = "0.5";
            setTimeout(() => { document.getElementById('grid').style.opacity = "1"; }, 300);
        }

        function restart() { location.reload(); } // Hammasini noldan boshlash

        init(); draw();
    </script>
</body>
</html>
